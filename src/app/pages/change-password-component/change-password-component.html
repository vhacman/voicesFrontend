<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">

      <h4 class="card-title mb-1">Cambia password</h4>
      <p class="text-muted small mb-4">
        La tua password è scaduta. Impostane una nuova per continuare.
      </p>

      <form (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label for="newPassword" class="form-label">Nuova password</label>
          <input
            type="password"
            id="newPassword"
            class="form-control"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
          />
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Conferma password</label>
          <input
            type="password"
            id="confirmPassword"
            class="form-control"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
          />
        </div>

        @if (errorMessage) {
          <div class="alert alert-danger py-2">{{ errorMessage }}</div>
        }

        <button type="submit" class="btn btn-dark w-100">Salva</button>

      </form>
    </div>
  </div>
</div>
